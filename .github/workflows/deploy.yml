name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 153.126.148.31
          username: trader
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/trader/GMO_FX_BOT
            git fetch origin
            git reset --hard origin/main

            # 変更ファイルを取得
            CHANGED=$(git diff HEAD@{1} HEAD --name-only)

            # scheduler.py・trade_bot.py・ws_monitor.py・
            # config.py・gmo_client.py・polymarket.py・
            # notifier.py・backtest_config.json・params.json が変更された場合
            if echo "$CHANGED" | grep -qE "scheduler\.py|trade_bot\.py|ws_monitor\.py|config\.py|gmo_client\.py|polymarket\.py|notifier\.py|backtest_config\.json|params\.json"; then
              sudo systemctl restart gmo-fx-bot
              echo "gmo-fx-bot 再起動しました"
            fi

            # dashboard.py が変更された場合
            if echo "$CHANGED" | grep -q "dashboard\.py"; then
              sudo systemctl restart gmo-fx-dashboard
              echo "gmo-fx-dashboard 再起動しました"
            fi

            echo "デプロイ完了"
